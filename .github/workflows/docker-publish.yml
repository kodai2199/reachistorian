name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)"
            if [[ -z "${release_tag}" ]]; then
              echo "No semantic version tags matching v*.*.* were found."
              exit 1
            fi
          fi

          echo "Using release tag: ${release_tag}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/reachistorian
          tags: |
            type=raw,value=${{ steps.release.outputs.release_tag }}
            type=semver,pattern={{version}},value=${{ steps.release.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.release_tag }}
            type=raw,value=latest,enable=${{ startsWith(steps.release.outputs.release_tag, 'v') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
